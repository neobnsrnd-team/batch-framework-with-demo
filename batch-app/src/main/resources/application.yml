spring:
  application:
    name: hanabank-nbc-mis-batch

  # ─────────────────────────────────────────────────────────────
  # H2 In-Memory DataSource (Oracle 호환 모드)
  # ─────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:h2:mem:batchdb;MODE=Oracle;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      pool-name: batch-hikari-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ─────────────────────────────────────────────────────────────
  # Spring SQL 초기화 (schema.sql + data.sql 자동 실행)
  # ─────────────────────────────────────────────────────────────
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  # ─────────────────────────────────────────────────────────────
  # H2 Console (개발 편의 — http://localhost:8080/h2-console)
  # ─────────────────────────────────────────────────────────────
  h2:
    console:
      enabled: true
      path: /h2-console

  # ─────────────────────────────────────────────────────────────
  # Spring Security 자동 설정 비활성화
  # (SecurityConfig에서 직접 구성)
  # ─────────────────────────────────────────────────────────────
  security:
    user:
      name: ""        # 자동 생성 계정 비활성화

# ─────────────────────────────────────────────────────────────
# MyBatis 설정
# ─────────────────────────────────────────────────────────────
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.hanabank.nbc.mis.batch.framework.vo
  configuration:
    map-underscore-to-camel-case: false   # XML resultMap으로 명시적 매핑
    default-fetch-size: 100
    default-statement-timeout: 30
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# ─────────────────────────────────────────────────────────────
# 배치 프레임워크 설정
# ─────────────────────────────────────────────────────────────
batch:
  instance:
    id: WAS1              # WAS 인스턴스 ID (FWK_WAS_EXEC_BATCH.INSTANCE_ID)
  framework:
    scheduler-pool-size: 5      # 동시 실행 가능한 최대 배치 수
    fail-fast: false            # 단건 실패 시 전체 중단 여부
    log-interval: 1000          # 진행률 로그 출력 간격 (건)
    api:
      username: batchadmin      # REST API Basic Auth 사용자명
      password: batchpass       # REST API Basic Auth 패스워드

# ─────────────────────────────────────────────────────────────
# 서버 설정
# ─────────────────────────────────────────────────────────────
server:
  port: 8080
  tomcat:
    threads:
      max: 20
      min-spare: 5

# ─────────────────────────────────────────────────────────────
# 로깅 설정
# ─────────────────────────────────────────────────────────────
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.hanabank.nbc.mis.batch: INFO
    org.mybatis: DEBUG              # MyBatis SQL 로그
    org.springframework.security: INFO
    com.zaxxer.hikari: INFO
